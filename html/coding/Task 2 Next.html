<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <title>Infosys Contact</title>

    <style>
        body{
            font-family: Arial;
            background-color:#eef3f8;
            margin:0;
        }
        header{
            background-color:#00509d;
            color:white;
            text-align:center;
            padding:20px;
        }
        form{
            background:white;
            width:40%;
            margin:auto;
            padding:25px;
            border-radius:10px;
        }
        input, textarea{
            width:100%;
            padding:8px;
            margin:8px 0;
        }
        input[type=submit]{
            background-color:#002f6c;
            color:white;
            border:none;
            font-size:16px;
        }
    </style>
</head>

<body>

<header>
    <h1><b>Contact Infosys</b></h1>
</header>

<form action="submit.html" method="get">
    <label><b>Name:</b></label>
    <input type="text">

    <label><b>Email:</b></label>
    <input type="email">

    <label><b>Message:</b></label>
    <textarea rows="4"></textarea>

    <input type="submit" value="Submit">
</form>

</body>
</html>
</body>
</html>
